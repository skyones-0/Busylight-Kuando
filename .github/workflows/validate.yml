name: Validate Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Validate Project Structure
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Validate Project Structure
      run: |
        echo "✅ Validating Busylight project..."
        
        # Check main project exists
        if [ -d "Busylight" ]; then
          echo "✅ Busylight folder found"
        else
          echo "❌ Busylight folder missing"
          exit 1
        fi
        
        # Check Xcode project exists
        if [ -d "Busylight/Busylight.xcodeproj" ]; then
          echo "✅ Xcode project found"
        else
          echo "❌ Xcode project missing"
          exit 1
        fi
        
        # Check key source files exist
        if [ -f "Busylight/Services/BusylightManager.swift" ]; then
          echo "✅ BusylightManager.swift found"
        else
          echo "❌ BusylightManager.swift missing"
          exit 1
        fi
        
        # Check ML models exist
        if [ -d "Busylight/ML/Models" ]; then
          echo "✅ ML Models folder found"
        else
          echo "❌ ML Models folder missing"
          exit 1
        fi
        
        # Check SDK exists
        if [ -d "Busylight/BusylightSDK_Swift.framework" ]; then
          echo "✅ BusylightSDK framework found"
        else
          echo "❌ BusylightSDK framework missing"
          exit 1
        fi
        
        echo ""
        echo "🎉 All validations passed!"
        echo "Note: Full build requires macOS 26.2 (not available in GitHub Actions yet)"
        
    - name: Show Xcode Version
      run: |
        echo "Xcode version available in GitHub Actions:"
        xcodebuild -version
        echo ""
        echo "Project requires: macOS 26.2+"
