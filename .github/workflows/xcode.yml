# This workflow will build and test the Busylight macOS app
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-xcode

name: Xcode Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Build
      run: |
        xcodebuild build \
          -project "Busylight macOS/Busylight macOS.xcodeproj" \
          -scheme "Busylight macOS" \
          -destination "platform=macOS" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Run Tests
      run: |
        xcodebuild test \
          -project "Busylight macOS/Busylight mac OS.xcodeproj" \
          -scheme "Busylight mac OS" \
          -destination "platform=macOS" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Upload Test Results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          ~/Library/Developer/Xcode/DerivedData/*/Logs/Test/
