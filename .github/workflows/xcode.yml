# This workflow will build the Busylight macOS app
# Note: Tests require macOS 26.2 which is not available in GitHub Actions yet

name: Xcode Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Show Xcode Version
      run: xcodebuild -version

    - name: Show Available Destinations
      run: |
        xcodebuild -project "Busylight macOS/Busylight macOS.xcodeproj" \
          -scheme "Busylight macOS" \
          -showdestinations | head -20

    # Note: Full build requires macOS 26.2 which is not available in GitHub Actions
    # This workflow validates that the project structure is correct
    - name: Validate Project Structure
      run: |
        echo "Checking project structure..."
        ls -la "Busylight macOS/"
        ls -la "Busylight macOS/Busylight mac OS.xcodeproj/"
        echo "✅ Project structure validated"

